# manukeza.com — API port 3001. MUST include [::]:443 or IPv6 clients get alpha-bridge.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name manukeza.com www.manukeza.com;

    ssl_certificate /etc/letsencrypt/live/manukeza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manukeza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/manukeza/dist/apps/web;
    index index.html;
    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /hcgi/platform/ {
        proxy_pass http://127.0.0.1:3001/hcgi/platform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hcgi/api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name manukeza.com www.manukeza.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
