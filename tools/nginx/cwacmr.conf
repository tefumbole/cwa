# www.cwacmr.org — CWA Laravel. Separate from beyondtechworld.
server {
    listen 80;
    listen [::]:80;
    server_name cwacmr.org www.cwacmr.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cwacmr.org;

    ssl_certificate /etc/letsencrypt/live/www.cwacmr.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cwacmr.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/cwacmr/laravel-app;
    index index.php;
    charset utf-8;
    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }

    location ~ /\.(?!well-known).* { deny all; }
    location ~* /(?:\.env|\.env\..*|composer\.(json|lock)|artisan|server\.php|phpunit\.xml)$ { deny all; }
    location ~* ^/(app|bootstrap|config|database|deploy|db-import|resources|routes|storage|tests|vendor|read_me)/ { deny all; }

    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/cwacmr.access.log;
    error_log  /var/log/nginx/cwacmr.error.log;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cwacmr.org;

    ssl_certificate /etc/letsencrypt/live/www.cwacmr.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cwacmr.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.cwacmr.org$request_uri;
}
