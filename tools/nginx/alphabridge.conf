# alpha-bridge.net — API port 3003. Do NOT add bare IP to server_name (breaks other sites on IPv6).
server {
    listen 80;
    listen [::]:80;
    server_name alpha-bridge.net www.alpha-bridge.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alpha-bridge.net www.alpha-bridge.net;

    ssl_certificate /etc/letsencrypt/live/alpha-bridge.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alpha-bridge.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/alphabridge/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
    }
}
